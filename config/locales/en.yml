# Files in the config/locales directory are used for internationalization and
# are automatically loaded by Rails. If you want to use locales other than
# English, add the necessary files in this directory.
#
# To use the locales, use `I18n.t`:
#
#     I18n.t "hello"
#
# In views, this is aliased to just `t`:
#
#     <%= t("hello") %>
#
# To use a different locale, set it with `I18n.locale`:
#
#     I18n.locale = :es
#
# This would use the information in config/locales/es.yml.
#
# To learn more about the API, please read the Rails Internationalization guide
# at https://guides.rubyonrails.org/i18n.html.
#
# Be aware that YAML interprets the following case-insensitive strings as
# booleans: `true`, `false`, `on`, `off`, `yes`, `no`. Therefore, these strings
# must be quoted to be interpreted as strings. For example:
#
#     en:
#       "yes": yup
#       enabled: "ON"

en:
  hello: "Hello world"

  activerecord:
    attributes:
      reimboursement:
        role: "Role"
        role_other: "Other (short)"
    errors:
      models:
        reimboursement:
          attributes:
            role_other:
              blank_for_selected_role: "must be filled for the selected role"

  enums:
    reimboursement:
      status:
        created: "Waiting for processing"
        in_process: "In progress"
        approved: "Approved"
        paid: "Paid"
        waiting: "Waiting for user"
      role:
        volunteer: "Volunteer"
        employee_collaborator: "Employee/Collaborator"
        speaker_presenter: "Speaker/Presenter"
        scholarship_holder: "Scholarship holder"
        event_participant: "Event participant"
        event_co_organizer: "Event co-organizer (specify association name, location and tax code in the other field)"
        other: "Other"

  rimborsi:
    forms:
      reimboursement:
        role:
          title: "Role"
          label: "Role"
          prompt: "Select role"
          other_label: "Other (short)"
          other_placeholder: "Specify here: association name / location / tax code or other short text"
          other_help: "If you choose \"Event co-organizer\" enter association name, location and tax code here; for \"Other\" use a short text."
